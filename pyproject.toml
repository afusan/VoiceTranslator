[project]
name = "voice-translator"
version = "0.1.0"
description = "ローカルで動作する音声翻訳アプリ(MVP: Windows)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
    # MVP の各レイヤ実装ライブラリは後続ステップで追加していく:
    # soundcard, customtkinter, faster-whisper, transformers, pyttsx3, silero-vad ...
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-mock>=3.12",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/voice_translator"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
markers = [
    "slow: middle/large tests requiring real models or audio devices",
]
addopts = "-ra"
