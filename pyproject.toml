[project]
name = "voice-translator"
version = "0.1.0"
description = "ローカルで動作する音声翻訳アプリ(MVP: Windows)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
    "numpy>=1.26",
    "soundcard>=0.4",
    # ML系バックエンド(Step 4):
    "silero-vad>=5.1",
    "faster-whisper>=1.0",
    "transformers>=4.40",
    "torch>=2.2",
    "sentencepiece>=0.2",
    "pyttsx3>=2.90",
    # GUI(Step 5):
    "customtkinter>=5.2",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-mock>=3.12",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/voice_translator"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
markers = [
    "slow: middle/large tests requiring real models or audio devices",
]
addopts = "-ra"
